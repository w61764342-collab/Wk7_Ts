name: R2 — Count Files in Path

on:
  workflow_dispatch:
    inputs:
      path:
        description: >
          R2 folder path to count (e.g. "KCSB-Data/الاحصاءات العامة/").
          Leave empty to count the entire bucket.
        required: false
        default: ''
        type: string

jobs:
  count-files:
    name: Count files in R2 path
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install boto3
        run: pip install boto3

      - name: Count files
        env:
          CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}
        run: python CF/count_files.py "${{ github.event.inputs.path }}"
