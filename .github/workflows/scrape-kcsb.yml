name: KCSB Data Scraper

on:
  # Run quarterly on the 1st of January, April, July, and October at 12:00 PM UTC
  schedule:
    - cron: '0 12 1 1,4,7,10 *'
  
  # Allow manual trigger with category selection
  workflow_dispatch:
    inputs:
      category:
        description: 'Select category to scrape'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - الاحصاءات العامة
          - الاحصاءات السكانية
          - الإحصاءات الاقتصادية
          - الإحصاءات التجارية والزراعية
          - الاحصاءات الاجتماعية والخدمات
      workers:
        description: 'Number of parallel workers (3-5 recommended)'
        required: false
        default: '5'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '8'

jobs:
  scrape-data:
    name: Scrape KCSB Data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper for specific category
        if: github.event.inputs.category != 'all' && github.event.inputs.category != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          WORKERS="${{ github.event.inputs.workers }}"
          if [ -z "$WORKERS" ]; then WORKERS=5; fi
          python scraper.py --category "${{ github.event.inputs.category }}" --workers $WORKERS
      
      - name: Run scraper for all categories (scheduled or manual)
        if: github.event.inputs.category == 'all' || github.event.inputs.category == ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          WORKERS="${{ github.event.inputs.workers }}"
          if [ -z "$WORKERS" ]; then WORKERS=5; fi
          python scraper.py --workers $WORKERS
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
