name: KCSB R2 Schema Monitor

on:
  # Primary: run after the quarterly Cloudflare R2 scraper completes successfully
  workflow_run:
    workflows: ["Cloudflare R2 pipeline"]
    types: [completed]

  # Fallback: same quarterly dates, 8 hours after scraper (12:00 → 20:00 UTC)
  schedule:
    - cron: '0 20 1 1,4,7,10 *'

  workflow_dispatch:
    inputs:
      category:
        description: 'Main category to validate (empty = all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - الاحصاءات العامة
          - الاحصاءات السكانية
          - الإحصاءات الاقتصادية
          - الإحصاءات التجارية والزراعية
          - الاحصاءات الاجتماعية والخدمات
      date:
        description: 'Report date YYYY-MM-DD (default: today UTC)'
        required: false
        default: ''
        type: string
      update_stats:
        description: 'Update monitor_stats.yml in R2'
        required: false
        default: true
        type: boolean
      quality_checks:
        description: 'Run deep null-percentage checks'
        required: false
        default: true
        type: boolean
      fail_on_error:
        description: 'Exit with code 1 on any failed check'
        required: false
        default: false
        type: boolean

jobs:
  quarterly-validation:
    name: Validate KCSB R2 files (quarterly)
    runs-on: ubuntu-latest

    # Skip when triggered by a failed scraper run
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run R2 schema validation
        env:
          PYTHONUNBUFFERED: "1"
          CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}
          MONITOR_CATEGORY:        ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.category || '' }}
          MONITOR_DATE:            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.date || '' }}
          MONITOR_UPDATE_STATS:    ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_stats || 'true' }}
          MONITOR_QUALITY:         ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.quality_checks || 'true' }}
          MONITOR_FAIL_ON_ERROR:   ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fail_on_error || 'false' }}
        run: |
          ARGS=()
          if [ -n "$MONITOR_DATE" ]; then
            ARGS+=(--date "$MONITOR_DATE")
          fi
          if [ "$MONITOR_UPDATE_STATS" = "true" ]; then
            ARGS+=(--update-stats)
          fi
          if [ "$MONITOR_QUALITY" = "true" ]; then
            ARGS+=(--quality)
          fi
          if [ "$MONITOR_FAIL_ON_ERROR" = "true" ]; then
            ARGS+=(--fail-on-error)
          fi
          if [ -n "$MONITOR_CATEGORY" ]; then
            ARGS+=(--category "$MONITOR_CATEGORY")
          fi
          python monitor/inspect_r2_schema.py "${ARGS[@]}"
